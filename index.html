<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💕 韩舒雨想你了</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    background:#fff0f3;
    min-height:100dvh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    overflow:hidden;
}
canvas{
    display:block;
    width:600px;height:600px;
    max-width:98vw;max-height:98vw;
}
.title{
    position:fixed;top:20px;left:0;right:0;
    text-align:center;
    font-size:24px;font-weight:700;
    color:#c9184a;z-index:10;
    letter-spacing:2px;
}
.counter{
    position:fixed;top:22px;right:22px;
    font-size:40px;font-weight:900;
    color:#ffb3c1;z-index:10;
    font-family:"PingFang SC",sans-serif;
}
.footer{
    position:fixed;bottom:28px;left:0;right:0;
    text-align:center;
    font-size:14px;color:#590d22;z-index:10;
    opacity:0.4;letter-spacing:1px;
}
</style>
</head>
<body>

<div class="title">💕 韩舒雨想你了</div>
<div class="counter" id="counter">0</div>
<div class="footer">💕 一个一个弹出来，堆成一颗心</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── 100 个爱心坐标（跟 Python 版一样的算法） ──
const COUNT = 100;
const TEXT = '韩舒雨想你了';
const points = [];
for (let i = 0; i < COUNT; i++) {
    const t = 2 * Math.PI * i / COUNT;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
    const seed = i * 12345 + 6789;
    const jx = (Math.sin(seed) * 4 + Math.cos(seed * 3) * 4) * 0.5;
    const jy = (Math.cos(seed * 2) * 4 + Math.sin(seed * 5) * 4) * 0.5;
    points.push({
        x: 300 + x * 16 + jx,
        y: 330 - y * 16 + jy
    });
}

const COLORS = ["#c9184a","#a4133c","#800f2f","#e63946","#d90429","#ef233c","#ff4d6d","#e63946"];

let currentIndex = 0;
let tick = 0;
let frame = 0;
const itemAnim = new Array(COUNT).fill(0);

function resize() {
    const size = Math.min(window.innerWidth * 0.92, window.innerHeight * 0.8, 580);
    canvas.width = size * window.devicePixelRatio;
    canvas.height = size * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';
    return size;
}

function draw() {
    const size = resize();
    const ratio = size / 600;
    ctx.clearRect(0, 0, size, size);

    // 每 3 帧弹出一个
    tick++;
    if (tick >= 3 && currentIndex < COUNT) {
        tick = 0;
        itemAnim[currentIndex] = 0.001;
        currentIndex++;
        document.getElementById('counter').textContent = currentIndex;
    }

    // 画连线（已出现的点之间）
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(201,24,74,0.04)';
    ctx.lineWidth = 1;
    for (let i = 0; i < currentIndex; i++) {
        for (let j = i + 1; j < currentIndex; j++) {
            const dx = points[i].x * ratio - points[j].x * ratio;
            const dy = points[i].y * ratio - points[j].y * ratio;
            if (dx*dx + dy*dy < 2500) {
                ctx.moveTo(points[i].x * ratio, points[i].y * ratio);
                ctx.lineTo(points[j].x * ratio, points[j].y * ratio);
            }
        }
    }
    ctx.stroke();

    // 画每个「韩舒雨想你了」
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    for (let i = 0; i < currentIndex; i++) {
        const px = points[i].x * ratio;
        const py = points[i].y * ratio;
        const color = COLORS[i % COLORS.length];

        // 弹出动画进度
        if (itemAnim[i] < 1) itemAnim[i] = Math.min(1, itemAnim[i] + 0.035);
        const p = itemAnim[i];

        // 弹跳缩放
        let sc = 1;
        if (p < 0.2) sc = 0.3 + 3.5 * p;
        else if (p < 0.35) sc = 1 + 0.35 * Math.sin((p - 0.2) / 0.15 * Math.PI);

        const breathe = 1.5 * Math.sin(frame * 0.025 + i * 0.8);
        const fontSize = Math.max(9, Math.min(17, (11 + breathe) * sc * (size / 600)));

        ctx.font = `bold ${fontSize}px "PingFang SC","Microsoft YaHei",sans-serif`;

        // 白色描边（清晰可读）
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 2.5;
        ctx.strokeText(TEXT, px, py);

        // 主色
        ctx.fillStyle = color;
        ctx.fillText(TEXT, px, py);

        // 发光
        if (p < 0.5) {
            ctx.shadowBlur = 10;
            ctx.shadowColor = color;
            ctx.fillText(TEXT, px, py);
        }
    }

    frame++;
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
